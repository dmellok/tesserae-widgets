name: Refresh widget star counts

# Hourly cron + manual trigger. The script fetches stargazer counts
# from the GitHub API for every widget repo listed in widgets.json
# and writes stars.json. It only rewrites the file when counts
# actually change, so the repo doesn't churn one no-op commit per
# hour on quiet days.

on:
  schedule:
    # Minute 7 to dodge round-hour congestion against GitHub's cron.
    - cron: "7 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-stars
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh stars.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh_stars.py

      - name: Commit if changed
        run: |
          if git diff --quiet stars.json; then
            echo "No star changes; nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add stars.json
            git commit -m "Refresh widget star counts"
            git push
          fi
